name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci # postinstall runs prisma generate (schema only, no DB needed)
      - run: npm run typecheck
      - run: npm run test:coverage # enforces the P1 coverage thresholds from vitest.config.ts
